services:
  mysql:
    image: mysql:8.1
    container_name: account_book_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: account_book
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: account_book_api
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: "root"
      DB_NAME: account_book
    ports:
      - "8000:8000"
    depends_on:
      - mysql
    restart: unless-stopped

volumes:
  mysql_data: